name: AI Codification Pipeline
on:
  push:
    paths:
      - 'references/**'
  workflow_dispatch:
jobs:
  ai_process:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: pip install -r requirements.txt
      - name: Detect Changed Reference Files
        id: changed_refs
        run: |
          if [ -z "${{ github.event.before }}" ] || [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            # 수동 실행(workflow_dispatch, before 없음) 또는 새 브랜치 최초 push 시 references 전체 처리.
            changed_files=$(find references -type f \( -name "*.txt" -o -name "*.pdf" \) | sort)
          else
            # 추가(A)뿐 아니라 수정(M)된 reference 도 재처리한다(#10).
            changed_files=$(git -c core.quotePath=false diff --diff-filter=AM --name-only "${{ github.event.before }}" "${{ github.sha }}" -- 'references/**/*.txt' 'references/**/*.pdf' 'references/*.txt' 'references/*.pdf' | sort -u)
          fi
          {
            echo 'reference_files<<EOF'
            printf '%s\n' "$changed_files"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Run AI Automation Script
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          REFERENCE_FILES: ${{ steps.changed_refs.outputs.reference_files }}
          PYTHONUNBUFFERED: '1'
        run: python scripts/auto_codify.py
      - name: Run Tests
        run: pytest
      - name: Commit and Push AI Generated Files
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/ src/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 AI Auto-Commit: PDF/TXT 문서 분석 및 코드 생성 완료" && git push)
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.sha.substring(0, 7);
            const title = `🚨 AI 파이프라인 실패 (${sha})`;
            const body = [
              `자동 코드화 파이프라인이 실패했습니다.`,
              ``,
              `- 커밋: \`${context.sha}\``,
              `- 실행 로그: ${runUrl}`,
              `- 트리거: \`${context.eventName}\``,
              ``,
              `실패 단계의 로그를 확인하세요. (\`Run AI Automation Script\` / \`Run Tests\`)`,
            ].join('\n');
            // 같은 커밋에 대해 열려 있는 중복 이슈가 없을 때만 생성한다.
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'ai-pipeline-failure',
            });
            if (existing.data.some(i => i.title === title)) {
              core.info('이미 동일 실패 이슈가 열려 있어 생성을 건너뜁니다.');
              return;
            }
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title, body, labels: ['ai-pipeline-failure'],
            });
